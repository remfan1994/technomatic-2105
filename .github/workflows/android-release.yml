name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-build:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build unsigned release APK
        run: gradle --no-daemon assembleRelease

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/technomatic-2105-release.jks"

      - name: Build signed release APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          gradle --no-daemon assembleRelease \
            -PTECHNOMATIC_2105_RELEASE_STORE_FILE="$RUNNER_TEMP/technomatic-2105-release.jks" \
            -PTECHNOMATIC_2105_RELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PTECHNOMATIC_2105_RELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PTECHNOMATIC_2105_RELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: technomatic-2105-release-apks
          path: app/build/outputs/apk/release/*.apk
